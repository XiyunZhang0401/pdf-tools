<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 插入工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --primary: #1e3a5f;
    --primary-light: #2c5282;
    --primary-hover: #162d4a;
    --accent: #b8860b;
    --bg: #f5f0eb;
    --card: #ffffff;
    --border: #d8d0c8;
    --text: #2d2a24;
    --text-secondary: #6b6560;
    --success: #2d6b3f;
    --radius: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --sidebar-w: 200px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, "Noto Serif SC", "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    position: fixed; top: 0; left: 0; width: var(--sidebar-w);
    height: 100vh; background: var(--primary);
    display: flex; flex-direction: column;
    padding: 32px 0; z-index: 100;
  }
  .sidebar .brand {
    padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 16px;
  }
  .sidebar .brand h2 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .sidebar .brand p { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; font-family: system-ui, sans-serif; }
  .sidebar a {
    display: block; padding: 10px 20px; color: rgba(255,255,255,0.65);
    text-decoration: none; font-size: 14px; font-family: system-ui, sans-serif;
    font-weight: 500; transition: all 0.15s; border-left: 3px solid transparent;
  }
  .sidebar a:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .sidebar a.active { color: #fff; background: rgba(255,255,255,0.1); border-left-color: var(--accent); }
  .sidebar .footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: rgba(255,255,255,0.3); font-family: system-ui, sans-serif; }

  .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px 36px; max-width: calc(100vw - var(--sidebar-w)); }
  .container { max-width: 960px; width: 100%; }

  h1 {
    font-family: Georgia, "Noto Serif SC", serif;
    font-size: 26px; font-weight: 700; margin-bottom: 4px;
    color: var(--primary); letter-spacing: 0.3px;
  }
  h1 span { background: var(--primary); color: #fff; font-size: 12px; padding: 2px 10px; font-weight: 500; font-family: system-ui, sans-serif; vertical-align: middle; }
  .subtitle { color: var(--text-secondary); margin-bottom: 28px; font-size: 14px; font-family: system-ui, sans-serif; }
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid var(--border);
    padding: 28px; margin-bottom: 20px;
  }
  .drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: all 0.25s;
  }
  .drop-zone:hover { border-color: var(--primary); background: #f8f6f3; }
  .drop-zone.dragover { border-color: var(--primary); background: #efece7; transform: scale(1.01); }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; color: var(--primary); opacity: 0.6; }
  .drop-zone-text { font-size: 15px; font-weight: 500; font-family: system-ui, sans-serif; }
  .drop-zone-hint { font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-family: system-ui, sans-serif; }
  .drop-zone input { display: none; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 18px; border-radius: var(--radius); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: system-ui, sans-serif;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { background: #b0a8a0; cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #1f5230; }
  .btn-success:disabled { background: #b0a8a0; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }
  .btn-sm { padding: 4px 12px; font-size: 12px; }
  .btn-danger { background: #faf6f5; color: #b91c1c; border: 1px solid #e8d8d4; }
  .btn-danger:hover { background: #f5edeb; }

  .action-bar { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
  .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 16px; display: none; }
  .progress-bar .fill { height: 100%; width: 0%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
  .status { text-align: center; margin-top: 12px; font-size: 14px; color: var(--text-secondary); }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* PDF list */
  .pdf-card {
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 12px; overflow: hidden;
    transition: all 0.2s;
  }
  .pdf-card.base { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,70,229,0.15); }
  .pdf-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer;
    background: #fafbfc; user-select: none;
  }
  .pdf-card-header:hover { background: #f1f5f9; }
  .pdf-card-header .icon { font-size: 22px; }
  .pdf-card-header .info { flex: 1; min-width: 0; }
  .pdf-card-header .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pdf-card-header .meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .pdf-card-header .badge {
    font-size: 11px; padding: 2px 10px; border-radius: 12px;
    background: var(--primary); color: #fff; font-weight: 600;
  }
  .pdf-card-header .badge.base-badge { background: var(--success); }
  .pdf-card-header .badge.selected-badge { background: #d97706; }
  .pdf-card-header .expand-icon { color: #94a3b8; font-size: 18px; transition: transform 0.2s; }
  .pdf-card-header .expand-icon.open { transform: rotate(180deg); }
  .pdf-card-body { padding: 16px 18px; display: none; border-top: 1px solid var(--border); }
  .pdf-card-body.open { display: block; }

  /* Page thumbnails */
  .page-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
    max-height: 400px; overflow-y: auto; padding: 4px 0;
  }
  .page-thumb {
    position: relative; width: 130px; cursor: pointer;
    border: 2px solid var(--border); border-radius: 6px;
    overflow: hidden; transition: all 0.15s; flex-shrink: 0;
    background: #fff;
  }
  .page-thumb:hover { border-color: #94a3b8; }
  .page-thumb.selected { border-color: #d97706; box-shadow: 0 0 0 2px rgba(217,119,6,0.25); }
  .page-thumb.insert-point { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79,70,229,0.25); }
  .page-thumb canvas { display: block; width: 100%; height: auto; }
  .page-thumb .page-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 11px; text-align: center; padding: 3px 0;
  }
  .page-thumb .page-check {
    position: absolute; top: 6px; left: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(255,255,255,0.9); border: 2px solid #94a3b8;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    transition: all 0.15s;
  }
  .page-thumb.selected .page-check { background: #d97706; border-color: #d97706; }
  .page-thumb .page-pos-marker {
    position: absolute; top: 50%; right: -10px; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; z-index: 2;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .loading-pages { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
  .empty-pages { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }

  /* Insert position bar */
  .insert-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; background: #f5f3ff;
    border: 1px solid #ddd6fe; border-radius: 8px;
    margin-top: 12px; flex-wrap: wrap;
  }
  .insert-bar label { font-size: 13px; font-weight: 600; color: var(--primary); }
  .insert-bar select {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: #fff; min-width: 140px;
  }
  .insert-bar select:focus { outline: none; border-color: var(--primary); }
  .insert-summary { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }

  /* Page range selector */
  .range-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: #f8fafc;
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .range-bar label { font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
  .range-bar input[type="text"] {
    padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; width: 160px; outline: none;
  }
  .range-bar input[type="text"]:focus { border-color: var(--primary); }
  .range-bar .hint { font-size: 11px; color: var(--text-secondary); }

  /* preview */
  .preview-card { padding: 20px; }
  .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .preview-header h2 { font-size: 16px; font-weight: 600; }
  .preview-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .preview-frame { width: 100%; height: 520px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }

  @media (max-width: 700px) {
    .card { padding: 18px; }
    .drop-zone { padding: 28px 16px; }
    h1 { font-size: 22px; }
    .page-thumb { width: 100px; }
    .pdf-card-header { padding: 12px 14px; }
    .pdf-card-body { padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <h2>PDF 工具</h2>
    <p>浏览器本地处理</p>
  </div>
  <a href="pdf-merger.html" class="active">插入模式</a>
  <a href="pdf-merger1.html">合并模式</a>
  <a href="pdf-export.html">导出模式</a>
  <div class="footer">文件不会上传至服务器</div>
</div>
<div class="main">
<div class="container">
  <h1>PDF 插入</h1>
  <p class="subtitle">将某份 PDF 的指定页面插入到另一份 PDF 的任意位置 — 浏览器本地处理，文件不上传</p>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">点击选择 PDF 文件，或拖拽到此处</div>
      <div class="drop-zone-hint">选择需要操作的所有 PDF 文件</div>
      <input type="file" id="fileInput" multiple accept=".pdf,application/pdf">
    </div>
  </div>

  <div id="pdfList"></div>

  <div class="card" id="actionCard" style="display:none;">
    <div class="action-bar">
      <button class="btn btn-success" id="executeBtn" disabled>执行插入</button>
      <button class="btn btn-outline" id="clearBtn">清空所有</button>
    </div>
    <div id="executeInfo" style="margin-top:8px;font-size:13px;color:var(--text-secondary);"></div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card preview-card" id="previewCard" style="display:none;">
    <div class="preview-header">
      <h2>预览</h2>
      <button class="btn btn-outline btn-sm" id="closePreviewBtn">关闭预览</button>
    </div>
    <div class="preview-info" id="previewInfo"></div>
    <iframe class="preview-frame" id="previewIframe"></iframe>
    <div style="margin-top:10px;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="downloadBtn">导出</button>
      <button class="btn btn-outline" id="continueInsertBtn">继续插入</button>
    </div>
  </div>

  <div style="text-align:center;font-size:12px;color:var(--text-secondary);font-family:system-ui,sans-serif;">
    使用 PDF-Lib + PDF.js 在浏览器端处理，文件不会离开你的设备
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ===== DOM refs =====
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const pdfList = document.getElementById('pdfList');
  const executeBtn = document.getElementById('executeBtn');
  const clearBtn = document.getElementById('clearBtn');
  const executeInfo = document.getElementById('executeInfo');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const statusEl = document.getElementById('status');
  const toast = document.getElementById('toast');
  const previewCard = document.getElementById('previewCard');
  const previewIframe = document.getElementById('previewIframe');
  const previewInfo = document.getElementById('previewInfo');
  const closePreviewBtn = document.getElementById('closePreviewBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const continueInsertBtn = document.getElementById('continueInsertBtn');
  const actionCard = document.getElementById('actionCard');

  // ===== State =====
  let lastResultBytes = null;
  let pdfs = [];          // { id, name, size, file, pdfDoc(pdfjs), numPages, thumbnails:[], isBase, selectedPages:Set, expanded }
  let lastBlobUrl = null;
  let insertPosition = 0; // 0 = before page 1

  // ===== Utilities =====
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function showToast(msg, dur = 2500) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), dur);
  }

  function setStatus(msg) { statusEl.textContent = msg; }
  function setProgress(pct) { progressBar.style.display = 'block'; progressFill.style.width = pct + '%'; }
  function hideProgress() { progressBar.style.display = 'none'; progressFill.style.width = '0%'; }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ===== PDF Loading =====
  async function loadPDFMeta(file) {
    const arrayBuf = await file.arrayBuffer();
    const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuf.slice(0) }).promise;
    const numPages = pdfDoc.numPages;
    // Render thumbnails
    const thumbnails = [];
    for (let i = 1; i <= Math.min(numPages, 20); i++) {
      try {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: 0.3 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        thumbnails.push(canvas.toDataURL('image/jpeg', 0.6));
      } catch(e) {
        thumbnails.push(null);
      }
    }
    pdfDoc.destroy();
    return { numPages, thumbnails };
  }

  async function addFiles(newFiles) {
    for (const f of newFiles) {
      if (!f.name.toLowerCase().endsWith('.pdf')) {
        showToast('跳过非 PDF 文件: ' + f.name);
        continue;
      }
      if (pdfs.some(p => p.name === f.name && p.size === f.size)) continue;

      const id = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const entry = { id, name: f.name, size: f.size, file: f, isBase: pdfs.length === 0, selectedPages: new Set(), expanded: false, numPages: 0, thumbnails: [], loading: true };
      pdfs.push(entry);
      render();

      try {
        const meta = await loadPDFMeta(f);
        entry.numPages = meta.numPages;
        entry.thumbnails = meta.thumbnails;
        entry.loading = false;
        render();
      } catch (e) {
        entry.numPages = 0;
        entry.loading = false;
        entry.error = '无法加载此 PDF';
        render();
        showToast('加载失败: ' + f.name);
      }
    }
    updateActionState();
  }

  function removePDF(id) {
    pdfs = pdfs.filter(p => p.id !== id);
    // If base was removed, set first remaining as base
    if (!pdfs.some(p => p.isBase) && pdfs.length > 0) pdfs[0].isBase = true;
    render();
    updateActionState();
  }

  function setBase(id) {
    pdfs.forEach(p => p.isBase = (p.id === id));
    // Clear selected pages on what was formerly the base
    render();
    updateActionState();
  }

  function setInsertPosition(pos) {
    insertPosition = parseInt(pos);
    render();
    updateActionState();
  }

  function toggleExpand(id) {
    const p = pdfs.find(p => p.id === id);
    if (p) { p.expanded = !p.expanded; render(); }
  }

  function togglePage(id, pageIdx) {
    const p = pdfs.find(p => p.id === id);
    if (!p || p.isBase) return;
    if (p.selectedPages.has(pageIdx)) p.selectedPages.delete(pageIdx);
    else p.selectedPages.add(pageIdx);
    render();
    updateActionState();
  }

  function parseRange(input, maxPage) {
    const s = input.trim().toLowerCase();
    if (!s || s === 'none') return [];
    if (s === 'all') return Array.from({ length: maxPage }, (_, i) => i);

    const pages = new Set();
    const parts = s.split(',');
    for (const part of parts) {
      const trimmed = part.trim();
      if (!trimmed) continue;
      const m = trimmed.match(/^(\d+)(?:\s*-\s*(\d+))?$/);
      if (!m) return null; // invalid format
      const start = parseInt(m[1]);
      const end = m[2] !== undefined ? parseInt(m[2]) : start;
      if (start < 1 || end < 1 || start > maxPage || end > maxPage) return null;
      for (let i = Math.min(start, end); i <= Math.max(start, end); i++) {
        pages.add(i - 1); // convert to 0-based
      }
    }
    return [...pages].sort((a, b) => a - b);
  }

  function applyRange(id) {
    const p = pdfs.find(p => p.id === id);
    if (!p || p.isBase) return;
    const input = document.getElementById('rangeInput_' + id);
    if (!input) return;
    const result = parseRange(input.value, p.numPages);
    if (result === null) {
      showToast('无效的页码范围，请使用格式如: 1-3,5,7-9');
      return;
    }
    p.selectedPages = new Set(result);
    render();
    updateActionState();
  }

  function selectAll(id) {
    const p = pdfs.find(p => p.id === id);
    if (!p || p.isBase) return;
    p.selectedPages = new Set(Array.from({ length: p.numPages }, (_, i) => i));
    render();
    updateActionState();
  }

  function deselectAll(id) {
    const p = pdfs.find(p => p.id === id);
    if (!p) return;
    p.selectedPages.clear();
    render();
    updateActionState();
  }

  // ===== Render =====
  function render() {
    let html = '';
    for (const p of pdfs) {
      const isBase = p.isBase;
      const selectedCount = p.selectedPages.size;
      html += `
        <div class="pdf-card ${isBase ? 'base' : ''}">
          <div class="pdf-card-header" onclick="toggleExpand('${p.id}')">
            <span class="icon">${isBase ? '📋' : '📄'}</span>
            <div class="info">
              <div class="name">${escHtml(p.name)} ${p.loading ? '⏳ 加载中...' : ''}</div>
              <div class="meta">
                ${p.loading ? '正在解析页面...' : (p.error ? p.error : `${p.numPages} 页 · ${formatSize(p.size)}`)}
                ${!isBase && selectedCount > 0 ? `· 已选 ${selectedCount} 页` : ''}
              </div>
            </div>
            ${isBase ? '<span class="badge base-badge">目标文件</span>' : (selectedCount > 0 ? `<span class="badge selected-badge">已选 ${selectedCount}</span>` : '')}
            <span class="expand-icon ${p.expanded ? 'open' : ''}">▼</span>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();removePDF('${p.id}')" title="移除此文件" style="padding:2px 8px;font-size:16px;line-height:1;">×</button>
          </div>
          <div class="pdf-card-body ${p.expanded ? 'open' : ''}">
            ${renderPages(p)}
          </div>
        </div>`;
    }
    pdfList.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text-secondary);font-size:14px;">暂无文件，请添加 PDF</div>';
    actionCard.style.display = pdfs.length >= 2 ? 'block' : 'none';
  }

  function renderPages(p) {
    if (p.loading) return '<div class="loading-pages">⏳ 正在生成缩略图...</div>';
    if (p.error) return '<div class="empty-pages">⚠️ ' + p.error + '</div>';
    if (p.numPages === 0) return '<div class="empty-pages">此 PDF 无页面</div>';

    let pages = '';

    // Range selector for non-base PDFs
    if (!p.isBase) {
      pages += `
        <div class="range-bar">
          <label>选择页：</label>
          <input type="text" id="rangeInput_${p.id}" placeholder="例: 1-3,5,7-9" value="">
          <button class="btn btn-sm btn-outline" onclick="applyRange('${p.id}')">确定</button>
          <button class="btn btn-sm btn-outline" onclick="selectAll('${p.id}')">全部</button>
          <button class="btn btn-sm btn-outline" onclick="deselectAll('${p.id}')">清空</button>
          <span class="hint">页码从 1 开始，支持 "1-3,5,7-9" 或 "all"</span>
        </div>`;
    }

    for (let i = 0; i < p.numPages; i++) {
      const thumb = p.thumbnails[i];
      if (p.isBase) {
        // Base PDF - show as insert position targets
        pages += `
          <div class="page-thumb insert-point ${insertPosition === i ? 'selected' : ''}" onclick="setInsertPosition(${i})" title="点击设为插入位置">
          ${thumb ? `<img style="display:block;width:100%;height:auto;" src="${thumb}" alt="第${i+1}页">` : `<div style="height:100px;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#94a3b8;font-size:12px;">第 ${i+1} 页</div>`}
            <div class="page-label">第 ${i+1} 页</div>
            ${insertPosition === i ? '<div class="page-pos-marker">▼</div>' : ''}
            ${i === 0 ? '<div style="position:absolute;top:6px;right:6px;font-size:10px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:4px;">起始</div>' : ''}
          </div>`;
      } else {
        // Non-base PDF - show selectable pages
        const sel = p.selectedPages.has(i);
        pages += `
          <div class="page-thumb ${sel ? 'selected' : ''}" onclick="togglePage('${p.id}', ${i})" title="${sel ? '取消选择' : '选择此页'}">
            ${thumb ? `<img style="display:block;width:100%;height:auto;" src="${thumb}" alt="第${i+1}页">` : `<div style="height:100px;display:flex;align-items:center;justify-content:center;background:#f8fafb;color:#94a3b8;font-size:12px;">第 ${i+1} 页</div>`}
            <div class="page-label">第 ${i+1} 页</div>
            <div class="page-check">${sel ? '✓' : ''}</div>
          </div>`;
      }
    }

    if (p.isBase) {
      // Add "at end" option
      const endIdx = p.numPages;
      pages += `
        <div class="page-thumb insert-point ${insertPosition === endIdx ? 'selected' : ''}" onclick="setInsertPosition(${endIdx})" title="点击设为插入位置" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:140px;background:#fafbfc;">
          <div style="font-size:28px;color:var(--primary);">⏹</div>
          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">末尾</div>
          ${insertPosition === endIdx ? '<div class="page-pos-marker" style="position:static;margin-top:4px;transform:none;display:inline-flex;">▼</div>' : ''}
        </div>`;
    }

    // Insert summary for base
    let summary = '';
    if (p.isBase) {
      const totalSelected = pdfs.filter(x => !x.isBase).reduce((sum, x) => sum + x.selectedPages.size, 0);
      if (totalSelected > 0) {
        const posLabel = insertPosition === 0 ? '第 1 页之前' : (insertPosition >= p.numPages ? '末尾' : `第 ${insertPosition} 页之后`);
        summary = `<div class="insert-summary">将 ${totalSelected} 页插入到 <strong>${escHtml(p.name)}</strong> 的 <strong>${posLabel}</strong></div>`;
      }
    }

    return '<div class="page-grid">' + pages + '</div>' + summary;
  }

  function updateActionState() {
    const bases = pdfs.filter(p => p.isBase);
    const sources = pdfs.filter(p => !p.isBase);
    const hasSelection = sources.some(p => p.selectedPages.size > 0);
    executeBtn.disabled = !(pdfs.length >= 2 && hasSelection);

    const totalSelected = sources.reduce((s, p) => s + p.selectedPages.size, 0);
    const base = bases[0];
    if (base && totalSelected > 0) {
      const posLabel = insertPosition === 0 ? '第 1 页之前' : (insertPosition >= base.numPages ? '末尾' : `第 ${insertPosition} 页之后`);
      executeInfo.textContent = `将 ${totalSelected} 页插入到「${base.name}」的 ${posLabel}`;
    } else {
      executeInfo.textContent = pdfs.length < 2 ? '请添加至少 2 个 PDF 文件' : '请在其他 PDF 中选择要插入的页面';
    }
  }

  // ===== Execute Insertion =====
  async function executeInsert() {
    const base = pdfs.find(p => p.isBase);
    const sources = pdfs.filter(p => !p.isBase && p.selectedPages.size > 0);
    if (!base || sources.length === 0) return;

    executeBtn.disabled = true;
    setStatus('正在处理...');
    setProgress(0);
    previewCard.style.display = 'none';
    if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }

    try {
      // 1. Load base PDF via pdf-lib
      setStatus('正在加载目标文件...');
      setProgress(5);
      const baseBuf = await base.file.arrayBuffer();
      const baseDoc = await PDFLib.PDFDocument.load(baseBuf, { ignoreEncryption: true });

      // 2. Collect source pages in order (by index in sources array, then by page index)
      setStatus('正在收集源页面...');
      setProgress(15);
      const pagesToInsert = []; // { pdfDoc, pageIndex }
      for (const src of sources) {
        const srcBuf = await src.file.arrayBuffer();
        const srcDoc = await PDFLib.PDFDocument.load(srcBuf, { ignoreEncryption: true });
        const sortedIdxs = [...src.selectedPages].sort((a, b) => a - b);
        for (const idx of sortedIdxs) {
          pagesToInsert.push({ doc: srcDoc, pageIndex: idx });
        }
      }

      // 3. Build new document: copy pages before insert point, then source pages, then rest
      setStatus('正在重组页面...');
      setProgress(30);
      const newDoc = await PDFLib.PDFDocument.create();
      const totalBasePages = baseDoc.getPageCount();

      // Pages before insert point
      for (let i = 0; i < insertPosition && i < totalBasePages; i++) {
        const [copied] = await newDoc.copyPages(baseDoc, [i]);
        newDoc.addPage(copied);
      }

      // Inserted pages
      for (let pi = 0; pi < pagesToInsert.length; pi++) {
        setProgress(30 + ((pi + 1) / pagesToInsert.length) * 50);
        const { doc, pageIndex } = pagesToInsert[pi];
        const [copied] = await newDoc.copyPages(doc, [pageIndex]);
        newDoc.addPage(copied);
      }

      // Pages after insert point
      for (let i = insertPosition; i < totalBasePages; i++) {
        const [copied] = await newDoc.copyPages(baseDoc, [i]);
        newDoc.addPage(copied);
      }

      // 4. Save
      setStatus('正在生成 PDF...');
      setProgress(90);
      const mergedBytes = await newDoc.save();

      setProgress(100);
      setStatus('完成！');
      lastResultBytes = mergedBytes;
      const blob = new Blob([mergedBytes], { type: 'application/pdf' });
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(blob);

      // Show preview
      previewIframe.src = lastBlobUrl;
      previewInfo.textContent = `插入完成 · ${newDoc.getPageCount()} 页 · ${(blob.size / 1024).toFixed(1)} KB`;
      previewCard.style.display = 'block';
      previewCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      showToast(`插入完成！共 ${newDoc.getPageCount()} 页`);
    } catch (err) {
      console.error(err);
      showToast('插入失败：' + err.message);
      setStatus('出错了，请重试');
    } finally {
      executeBtn.disabled = false;
      setTimeout(hideProgress, 3000);
    }
  }

  // ===== Event Bindings =====
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });

  executeBtn.addEventListener('click', executeInsert);

  clearBtn.addEventListener('click', () => {
    pdfs = [];
    lastResultBytes = null;
    if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
    previewCard.style.display = 'none';
    previewIframe.src = '';
    actionCard.style.display = 'none';
    setStatus(''); hideProgress();
    render();
    updateActionState();
  });

  closePreviewBtn.addEventListener('click', () => {
    previewCard.style.display = 'none';
    previewIframe.src = '';
  });

  downloadBtn.addEventListener('click', () => {
    if (!lastBlobUrl) { showToast('请先执行插入'); return; }
    const a = document.createElement('a');
    a.href = lastBlobUrl;
    a.download = '插入后.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  continueInsertBtn.addEventListener('click', () => {
    if (!lastResultBytes) { showToast('请先执行插入'); return; }
    // Keep the result as a new PDF (set as the base/target)
    const resultFile = new File([lastResultBytes], '插入结果.pdf', { type: 'application/pdf' });
    // Load it to get page count and thumbnails
    const id = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const entry = { id, name: '插入结果.pdf', size: resultFile.size, file: resultFile, isBase: true, selectedPages: new Set(), expanded: false, numPages: 0, thumbnails: [], loading: true };
    lastResultBytes = null;
    pdfs = [entry];
    previewCard.style.display = 'none';
    previewIframe.src = '';
    if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
    render();
    updateActionState();
    // Load metadata
    loadPDFMeta(resultFile).then(meta => {
      entry.numPages = meta.numPages;
      entry.thumbnails = meta.thumbnails;
      entry.loading = false;
      render();
      updateActionState();
    }).catch(() => {
      entry.loading = false;
      entry.error = '无法加载';
      render();
    });
    showToast('已保留插入结果，可继续添加 PDF 进行插入');
  });

  // ===== Handle file-level operations from inline onclick =====
  window.toggleExpand = toggleExpand;
  window.togglePage = togglePage;
  window.setInsertPosition = setInsertPosition;
  window.removePDF = removePDF;
  window.applyRange = applyRange;
  window.selectAll = selectAll;
  window.deselectAll = deselectAll;

  render();
  updateActionState();
</script>
</body>
</html>
